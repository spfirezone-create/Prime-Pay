<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prime Pay - Dashboard</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome 6.4.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- DEFAULT THEME (PURE WHITE / LIGHT MODE) --- */
        :root {
            --bg-main: #ffffff;
            --card-bg: #f8fafc;
            --sidebar-item-bg: #f1f5f9;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-purple: #a855f7;
            --success-green: #10b981;
            --prime-red: #ff0011;
            --pay-text: #0f172a;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        /* --- DARK THEME OPTION (Only active on click) --- */
        .dark-theme {
            --bg-main: #0b111e;
            --card-bg: #111a2e;
            --sidebar-item-bg: #1e293b;
            --border-color: #1e293b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --pay-text: #ffffff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100dvh; /* Fits perfectly to mobile screen */
            overflow: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            position: relative;
        }

        a { text-decoration: none; }
        
        /* Click Animation */
        .click-sound {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
        }
        
        .click-sound:active {
            transform: scale(0.90);
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 10%;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            outline: none;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        /* BRAND LOGO */
        .brand-logo {
            font-size: 1.4rem;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 0, 17, 0.3);
        }

        .brand-logo .prime { color: var(--prime-red); font-weight: 800; font-style: italic; }
        .brand-logo .pay { color: var(--pay-text); font-weight: 800; font-style: italic; transition: color 0.3s ease; }

        /* --- MAIN CONTENT --- */
        main {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            height: 88%;
            gap: 15px;
        }

        /* BALANCE CARD */
        .balance-card {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .balance-card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.2), transparent 60%);
        }

        .balance-card p { font-size: 0.85rem; font-weight: 600; color: rgba(255, 255, 255, 0.9); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; position: relative; z-index: 2; }
        .balance-card h2 { font-size: 3rem; font-weight: 700; margin: 0; color: #ffffff; position: relative; z-index: 2; }

        /* 4 ITEM ACTION GRID */
        .action-grid-4 { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px 10px; display: grid; grid-template-columns: repeat(4, 1fr); box-shadow: var(--shadow); transition: all 0.3s ease; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .icon-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
        .action-item span { font-size: 0.65rem; font-weight: 600; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; transition: color 0.3s ease; }

        .ic-add { color: #3b82f6; background: rgba(59, 130, 246, 0.15); }
        .ic-withdraw { color: var(--success-green); background: rgba(16, 185, 129, 0.15); }
        .ic-pay { color: var(--accent-purple); background: rgba(168, 85, 247, 0.15); }
        .ic-history { color: #f59e0b; background: rgba(245, 158, 11, 0.15); }

        /* 2 ITEM ACTION GRID */
        .action-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 25px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; box-shadow: var(--shadow); transition: all 0.3s ease; }
        .action-card i { font-size: 1.8rem; }
        .action-card span { font-size: 0.8rem; font-weight: 600; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.3s ease; }
        
        .ic-gift { color: #ec4899; }
        .ic-bulk { color: #3b82f6; }

        /* LIFAFA SYSTEM CARD */
        .lifafa-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); transition: all 0.3s ease; }
        .lifafa-left { display: flex; align-items: center; gap: 15px; }
        .ic-lifafa { color: var(--prime-red); background: rgba(255, 0, 17, 0.15); width: 45px; height: 45px; }
        .lifafa-text h3 { font-size: 1.05rem; font-weight: 600; color: var(--text-main); margin-bottom: 2px; transition: color 0.3s ease; }
        .lifafa-text p { font-size: 0.65rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.3s ease; }
        .lifafa-card > i { color: var(--text-muted); font-size: 1.2rem; transition: color 0.3s ease; }

        /* --- SIDEBAR MENU --- */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
            z-index: 99;
        }

        .sidebar {
            position: fixed;
            top: 0; left: -100%;
            width: 75%; max-width: 320px; height: 100vh;
            background: var(--bg-main);
            box-shadow: 4px 0 20px rgba(0,0,0,0.1);
            z-index: 100;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
            overflow-y: auto;
        }

        /* Sidebar Open States */
        .sidebar.open { left: 0; }
        .sidebar-overlay.open { opacity: 1; visibility: visible; }

        /* Sidebar Header */
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .sidebar-header h2 {
            color: #3b82f6; /* Blue Menu Text */
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Sidebar Menu Items */
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: var(--sidebar-item-bg);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .menu-item i { font-size: 1.1rem; width: 20px; text-align: center; }

        /* Menu Icon Colors */
        .menu-item .fa-user { color: #3b82f6; } /* Blue */
        .menu-item .fa-code { color: #a855f7; } /* Purple */
        .menu-item .fa-lock { color: #10b981; } /* Green */
        .menu-item .fa-telegram { color: #0088cc; } /* Telegram Blue */
        .menu-item .fa-headset { color: #f97316; } /* Orange */
        
        .menu-item.logout { 
            background: rgba(255, 0, 17, 0.08); 
            color: var(--prime-red); 
            margin-top: 10px;
        }
        .menu-item.logout i { color: var(--prime-red); }

    </style>
</head>
<body>

    <!-- SIDEBAR MENU HTML -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>MENU</h2>
            <button class="icon-btn click-sound" id="closeMenuBtn" style="width: 35px; height: 35px;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="sidebar-menu">
            <a href="profile.html" class="menu-item click-sound">
                <i class="fa-solid fa-user"></i>
                <span>PROFILE</span>
            </a>
            <a href="api-setting.html" class="menu-item click-sound">
                <i class="fa-solid fa-code"></i>
                <span>API SYSTEM</span>
            </a>
            <a href="pin.html" class="menu-item click-sound">
                <i class="fa-solid fa-lock"></i>
                <span>CHANGE PIN</span>
            </a>
            <a href="#" class="menu-item click-sound">
                <i class="fa-brands fa-telegram"></i>
                <span>JOIN CHANNEL</span>
            </a>
            <a href="#" class="menu-item click-sound">
                <i class="fa-solid fa-headset"></i>
                <span>CUSTOMER SUPPORT</span>
            </a>
            <a href="login.html" class="menu-item logout click-sound">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span>LOGOUT</span>
            </a>
        </div>
    </aside>

    <div class="app-container">
        
        <!-- HEADER -->
        <header>
            <!-- Open Menu Button -->
            <button class="icon-btn click-sound" id="openMenuBtn">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
            
            <div class="brand-logo click-sound">
                <span class="prime">PRIME</span> <span class="pay">PAY</span>
            </div>
            
            <!-- THEME CHANGER ICON -->
            <button class="icon-btn click-sound" id="themeToggleBtn">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <!-- MAIN DASHBOARD CONTENT -->
        <main>
            <!-- Balance Card -->
            <section class="balance-card click-sound">
                <p>Total Balance</p>
                <h2>₹0.00</h2>
            </section>

            <!-- Top Action Grid -->
            <section class="action-grid-4">
                <a href="add-fund.html" class="action-item click-sound">
                    <div class="icon-circle ic-add"><i class="fa-solid fa-plus"></i></div>
                    <span>Add Fund</span>
                </a>
                <a href="withdraw.html" class="action-item click-sound">
                    <div class="icon-circle ic-withdraw"><i class="fa-solid fa-building-columns"></i></div>
                    <span>Withdraw</span>
                </a>
                <a href="pay-user.html" class="action-item click-sound">
                    <div class="icon-circle ic-pay"><i class="fa-solid fa-paper-plane"></i></div>
                    <span>Pay</span>
                </a>
                <a href="history.html" class="action-item click-sound">
                    <div class="icon-circle ic-history"><i class="fa-solid fa-clock-rotate-left"></i></div>
                    <span>History</span>
                </a>
            </section>

            <!-- Middle Action Grid -->
            <section class="action-grid-2">
                <a href="gift-code.html" class="action-card click-sound">
                    <i class="fa-solid fa-gift ic-gift"></i>
                    <span>Gift Codes</span>
                </a>
                <a href="bulk-pay.html" class="action-card click-sound">
                    <i class="fa-solid fa-layer-group ic-bulk"></i>
                    <span>Bulk Pay</span>
                </a>
            </section>

            <!-- Lifafa System Card -->
            <a href="lifafa.html" class="lifafa-card click-sound">
                <div class="lifafa-left">
                    <div class="icon-circle ic-lifafa">
                        <i class="fa-solid fa-envelope-open-text"></i>
                    </div>
                    <div class="lifafa-text">
                        <h3>Lifafa System</h3>
                        <p>Create & Share Giveaways</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script>
        // --- SIDEBAR LOGIC ---
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const openMenuBtn = document.getElementById('openMenuBtn');
        const closeMenuBtn = document.getElementById('closeMenuBtn');

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('open');
        }

        openMenuBtn.addEventListener('click', toggleSidebar);
        closeMenuBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);


        // --- THEME TOGGLE LOGIC (Always Starts White) ---
        const themeBtn = document.getElementById('themeToggleBtn');
        const body = document.body;
        const themeIcon = themeBtn.querySelector('i');

        themeBtn.addEventListener('click', () => {
            body.classList.toggle('dark-theme');
            
            // Icon change logic: Moon for Light mode, Sun for Dark mode
            if (body.classList.contains('dark-theme')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        });


        // --- WEB AUDIO API (CLICK SOUND) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playClickSound() {
            if (!audioCtx) { audioCtx = new AudioContext(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.05);
        }

        // Attach click sound listeners
        document.addEventListener('DOMContentLoaded', () => {
            const clickableElements = document.querySelectorAll('.click-sound');
            clickableElements.forEach(el => {
                el.addEventListener('pointerdown', playClickSound);
            });
        });
    </script>
</body>
</html>
