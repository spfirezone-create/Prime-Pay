<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Pay - Add Fund</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b111e; color: #ffffff; overflow-x: hidden; }

        /* Animations */
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- Top Bar --- */
        .top-bar { display: flex; align-items: center; padding: 20px; gap: 15px; background: #111a2e; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 10; }
        .back-btn { background: #1e293b; border: 1px solid #334155; color: #ffffff; width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .back-btn:active { transform: scale(0.9); }
        .page-title { font-size: 18px; font-weight: 700; font-style: italic; color: #a855f7; letter-spacing: 1px; text-transform: uppercase; }

        /* --- Main Content --- */
        .container { padding: 20px; padding-bottom: 40px; }
        .image-card { background: #111a2e; padding: 15px; border-radius: 20px; border: 1px solid #1e293b; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .qr-image { width: 100%; max-width: 320px; border-radius: 12px; }
        .section-title { font-size: 14px; color: #a855f7; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }

        /* --- Input Fields --- */
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; color: #cbd5e1; font-size: 11px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .custom-input { width: 100%; background: #111a2e; border: 1px solid #1e293b; color: #ffffff; padding: 16px 20px; border-radius: 15px; font-size: 15px; outline: none; transition: 0.3s; font-weight: 500; }
        .custom-input::placeholder { color: #475569; font-weight: 400; }
        .custom-input:focus { border-color: #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.15); }

        /* --- Submit Button --- */
        .submit-btn { width: 100%; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); transition: 0.3s; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .submit-btn:active { transform: scale(0.96); }

        /* --- Warning Box --- */
        .warning-box { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 15px; padding: 18px 15px; text-align: center; color: #ef4444; font-size: 12px; font-weight: 600; line-height: 1.6; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .warning-box i { font-size: 24px; color: #ef4444; }

    </style>
</head>
<body class="fade-in">

    <!-- Back Button - Returns to index.html -->
    <div class="top-bar">
        <a href="index.html" class="back-btn click-sound">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="page-title">ADD FUND</div>
    </div>

    <!-- Main Content -->
    <div class="container slide-up" style="animation-delay: 0.1s;">
        
        <div class="image-card">
            <img src="https://i.ibb.co/Xfw99McM/file-00000000597471fa88f5470b7b45225f.png" alt="Payment QR" class="qr-image">
        </div>

        <div class="section-title">
            <i class="fas fa-file-invoice-dollar"></i> SUBMIT DETAILS
        </div>

        <div class="input-group">
            <label class="input-label">Amount Paid (₹)</label>
            <input type="number" id="fundAmount" class="custom-input click-sound" placeholder="Enter exact amount">
        </div>

        <div class="input-group">
            <label class="input-label">UTR / Transaction No.</label>
            <input type="number" id="fundUtr" class="custom-input click-sound" placeholder="12-digit UTR number">
        </div>

        <!-- Button with Click Event for Admin Request -->
        <button class="submit-btn click-sound" id="submitBtn" onclick="submitFundRequest()">
            <i class="fas fa-paper-plane"></i> Submit For Verification
        </button>

        <div class="warning-box">
            <i class="fas fa-exclamation-triangle"></i>
            <span>EXACT UTR NUMBER DAALO - GALAT UTR PE BALANCE ADD NAHI HOGA!</span>
        </div>

    </div>

    <script>
        // Sound Effect
        function playClickSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
            osc.connect(gainNode); gainNode.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.05);
        }

        document.querySelectorAll('.click-sound').forEach(btn => {
            btn.addEventListener('mousedown', playClickSound);
            btn.addEventListener('touchstart', playClickSound, {passive: true});
        });

        // Submit Request Logic
        function submitFundRequest() {
            let amount = document.getElementById('fundAmount').value;
            let utr = document.getElementById('fundUtr').value;
            let btn = document.getElementById('submitBtn');

            if (amount === "" || utr === "") {
                alert("Please enter both Amount and UTR Number!");
                return;
            }
            if (utr.length < 12) {
                alert("UTR Number must be 12 digits long!");
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing Request...';
            btn.style.pointerEvents = 'none';

            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Sent to Admin Panel!';
                btn.style.background = 'linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)'; 
                
                alert(`Success! Add Fund Request of ₹${amount} sent to Admin for verification.`);

                document.getElementById('fundAmount').value = '';
                document.getElementById('fundUtr').value = '';

                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit For Verification';
                    btn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)'; 
                    btn.style.pointerEvents = 'auto'; 
                }, 3000);

            }, 2000);
        }
    </script>
</body>
</html>
