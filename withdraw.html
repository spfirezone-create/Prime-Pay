<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prime Pay - Withdraw</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #f8fafc; color: #0f172a; min-height: 100dvh; display: flex; justify-content: center; }

        .app-container { width: 100%; max-width: 480px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        /* --- STICKY HEADER --- */
        .page-header {
            display: flex; align-items: center; gap: 15px;
            padding: 10px 0; position: sticky; top: 0; background: #f8fafc; z-index: 10;
        }

        .back-btn {
            width: 45px; height: 45px; border-radius: 50%;
            background: #ffffff; border: 1.5px solid #e2e8f0;
            color: #0f172a; display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .page-header h1 { font-size: 1.2rem; font-weight: 700; color: #0f172a; letter-spacing: 0.5px; text-transform: uppercase; }

        /* --- BALANCE CARD --- */
        .balance-card {
            background: #ffffff; border-radius: 18px; padding: 25px 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center;
        }

        .balance-card span { font-size: 0.8rem; font-weight: 700; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
        .balance-card h2 { font-size: 1.6rem; font-weight: 800; color: #2563eb; margin: 0; }

        /* --- MAIN FORM CARD --- */
        .main-card {
            background: #ffffff; border-radius: 24px; padding: 25px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03); display: flex; flex-direction: column; gap: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        
        .input-group label { font-size: 0.75rem; font-weight: 700; color: #64748b; letter-spacing: 1px; text-transform: uppercase; }

        input {
            width: 100%; background: #f8fafc; border: 1.5px solid #f1f5f9; border-radius: 14px;
            height: 55px; padding: 0 20px; font-size: 0.95rem; font-weight: 600; color: #0f172a;
            outline: none; transition: border-color 0.3s ease;
        }
        input:focus { border-color: #2563eb; }
        input::placeholder { color: #94a3b8; font-weight: 600; }

        /* --- BUTTON (Matching Blue Add Fund Style) --- */
        .primary-btn {
            width: 100%; background: #2563eb; color: #ffffff;
            border: none; border-radius: 14px; height: 55px;
            font-size: 1rem; font-weight: 700; letter-spacing: 0.5px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
            margin-top: 10px; transition: all 0.3s ease;
        }

        /* Global Click Effect */
        .click-sound { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; user-select: none; }
        .click-sound:active { transform: scale(0.92); }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- HEADER -->
        <header class="page-header">
            <a href="index.html" class="back-btn click-sound"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>WITHDRAW</h1>
        </header>

        <!-- BALANCE STRIP -->
        <div class="balance-card click-sound">
            <span>Available Balance</span>
            <h2>₹0.00</h2>
        </div>

        <!-- MAIN CARD -->
        <div class="main-card">
            
            <div class="input-group">
                <label>YOUR UPI ID</label>
                <input type="text" id="upiId" placeholder="yourname@upi">
            </div>

            <div class="input-group">
                <label>AMOUNT (₹)</label>
                <input type="number" id="withAmount" placeholder="Min ₹10">
            </div>

            <button class="primary-btn click-sound" id="withdrawBtn" onclick="processWithdraw()">
                <i class="fa-solid fa-building-columns"></i> WITHDRAW
            </button>
            
        </div>
    </div>

    <!-- SCRIPTS -->
    <script>
        // Audio Script
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playClickSound() {
            if (!audioCtx) { audioCtx = new AudioContext(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.05);
        }

        document.querySelectorAll('.click-sound').forEach(el => { el.addEventListener('pointerdown', playClickSound); });

        // Simulated API Loading State
        function processWithdraw() {
            const btn = document.getElementById('withdrawBtn');
            const upi = document.getElementById('upiId');
            const amt = document.getElementById('withAmount');

            if(upi.value === '' || amt.value === '') {
                alert('Please enter UPI ID and Amount!');
                return;
            }

            if(Number(amt.value) < 10) {
                alert('Minimum withdrawal amount is ₹10');
                return;
            }

            // State 1: Loading
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESSING...';
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';

            // State 2: Success
            setTimeout(() => {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> REQUEST SENT';
                btn.style.backgroundColor = '#10b981'; // Success Green
                btn.style.opacity = '1';
                
                // State 3: Reset
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-solid fa-building-columns"></i> WITHDRAW';
                    btn.style.backgroundColor = ''; // Revert to Blue
                    btn.style.pointerEvents = 'auto';
                    upi.value = ''; amt.value = '';
                }, 2500);
            }, 1500);
        }
    </script>
</body>
</html>
